name: Ziyad APK Build
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build APK
        uses: ArtemSerebrennkov/buildozer-action@v1
        with:
          buildozer_version: stable
          python_version: 3.8

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Ziyad-Final-APK
          path: bin/*.apk
